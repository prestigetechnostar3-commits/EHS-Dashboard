
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EHS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#f0f2f5;}

header{
background:#1e3c72;color:#fff;text-align:center;padding:10px;
}

.controls button{
padding:5px 10px;margin:3px;font-size:12px;border:none;
background:#2a5298;color:#fff;border-radius:5px;cursor:pointer;
}

.slide{display:none;padding:20px;}
.active{display:block;}

.box{
background:black;color:white;padding:15px;margin:10px auto;
border-radius:8px;text-align:center;width:250px;
}

.value{font-size:30px;}

canvas{max-width:400px;margin:auto;}

</style>
</head>

<body>

<header>
<h2>EHS Dashboard</h2>

<div class="controls">
<button onclick="prevSlide()">◀</button>
<button onclick="toggleHold()" id="holdBtn">Pause</button>
<button onclick="nextSlide()">▶</button>
</div>

<div id="time"></div>
</header>

<div id="loading" style="text-align:center;padding:20px;">Loading...</div>

<!-- SLIDE 1 -->
<div class="slide active">
<div class="box">Manhours<div class="value" id="manhours">0</div></div>
<div class="box">Near Miss<div class="value" id="near">0</div></div>
<div class="box">Incident<div class="value" id="incident">0</div></div>
<canvas id="ehsPie"></canvas>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h3>Compliance</h3>
<table border="1" width="100%">
<thead><tr><th>Item</th><th>Due</th></tr></thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<h3>Water Dashboard</h3>
<canvas id="waterPie"></canvas>
</div>

<script>

/* ✅ SAFE FETCH */
async function safeFetch(url){
 try{
  let res=await fetch(url);
  if(!res.ok) throw "error";
  return await res.text();
 }catch(e){console.log(e);return null;}
}

/* ✅ TIME */
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleString();
},1000);

/* ✅ SLIDES */
let current=0,slides=document.querySelectorAll(".slide");
let timer; let paused=false;

function show(n){
slides.forEach(s=>s.classList.remove("active"));
slides[n].classList.add("active");
}
function nextSlide(){current=(current+1)%slides.length;show(current);}
function prevSlide(){current=(current-1+slides.length)%slides.length;show(current);}

function startSlides(){
timer=setInterval(()=>{if(!paused)nextSlide()},30000);
}
function toggleHold(){
paused=!paused;
document.getElementById("holdBtn").innerText=paused?"Resume":"Pause";
}

/* ✅ CSV */
async function csv(url){
let t=await safeFetch(url+"&_="+Date.now());
if(!t) return [];
return t.split("\n").map(x=>x.split(","));
}

/* ✅ PIE */
let pie,waterPie;

function updatePie(a,b){
if(pie) pie.destroy();
pie=new Chart(document.getElementById("ehsPie"),{
type:"pie",
data:{labels:["Near","Incident"],datasets:[{data:[a,b]}]}
});
}

function updateWaterPie(values){
if(waterPie) waterPie.destroy();
waterPie=new Chart(document.getElementById("waterPie"),{
type:"pie",
data:{datasets:[{data:values}]}
});
}

/* ✅ DATA LOAD */
const sheets={
near:"https://docs.google.com/spreadsheets/d/1NDBJNjEyQOr/export?format=csv",
incident:"https://docs.google.com/spreadsheets/d/1O95sjMBE/export?format=csv",
comp:"https://docs.google.com/spreadsheets/d/1orsK8rpDV/export?format=csv",
manhours:"https://docs.google.com/spreadsheets/d/1HMdv_W7Uc/export?format=csv",
water:"https://docs.google.com/spreadsheets/d/1b-8OGZK56/export?format=csv"
};

async function loadStats(){
let near=await csv(sheets.near);
let inc=await csv(sheets.incident);

document.getElementById("near").innerText=near.length-1;
document.getElementById("incident").innerText=inc.length-1;

updatePie(near.length-1,inc.length-1);
}

async function loadManhours(){
let data=await csv(sheets.manhours);
document.getElementById("manhours").innerText=(data[1]?.[1]||0);
}

async function loadCompliance(){
let data=await csv(sheets.comp);
let html="";
for(let i=1;i<data.length;i++){
html+=`<tr><td>${data[i][0]}</td><td>${data[i][1]}</td></tr>`;
}
document.getElementById("table").innerHTML=html;
}

async function loadWater(){
let data=await csv(sheets.water);
let values=[10,20,30,40,50];
updateWaterPie(values);
}

/* ✅ INIT */
async function init(){
show(0);
startSlides();

await Promise.all([
loadStats(),
loadManhours(),
loadCompliance(),
loadWater()
]);

document.getElementById("loading").style.display="none";
}

init();

/* ✅ AUTO REFRESH (Optimized) */
setInterval(loadStats,60000);
setInterval(loadManhours,120000);
setInterval(loadCompliance,120000);
setInterval(loadWater,120000);

</script>
</body>
</html>
