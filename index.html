<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EHS Advanced Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;font-family:Arial;background:#f5f7fa;
}

header{
background:#1e3c72;color:#fff;text-align:center;padding:10px;
}

.slide{
display:none;padding:20px;
}

.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.card{
background:#fff;padding:15px;border-radius:10px;
text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.value{
font-size:28px;font-weight:bold;color:#1e3c72;
}

canvas{
max-height:250px;
}
</style>
</head>

<body>

<header>
<h2>EHS ADVANCED DASHBOARD</h2>
<button onclick="prev()">◀</button>
<button onclick="toggle()">Pause</button>
<button onclick="next()">▶</button>
</header>

<!-- SLIDE 1 -->
<div class="slide active">
<div class="grid">
<div class="card">Manhours<div class="value" id="mh">0</div></div>
<div class="card">Near Miss<div class="value" id="near">0</div></div>
<div class="card">Incident<div class="value" id="incident">0</div></div>
</div>
<canvas id="pie"></canvas>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h3>Compliance</h3>
<table border="1" width="100%">
<thead><tr><th>Name</th><th>Days Left</th></tr></thead>
<tbody id="compTbl"></tbody>
</table>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<h3>Water Analysis</h3>
<div class="grid">
<div class="card">BWSSB<div class="value" id="bw"></div></div>
<div class="card">STP<div class="value" id="stp"></div></div>
<div class="card">RO<div class="value" id="ro"></div></div>
</div>
<canvas id="waterChart"></canvas>
</div>

<script>

// ===== SLIDES =====
let slides=document.querySelectorAll(".slide");
let i=0,paused=false;

function show(n){
slides.forEach(s=>s.classList.remove("active"));
slides[n].classList.add("active");
}

function next(){i=(i+1)%slides.length;show(i);}
function prev(){i=(i-1+slides.length)%slides.length;show(i);}
function toggle(){paused=!paused;}

setInterval(()=>{if(!paused)next()},20000);

// ===== CSV =====
async function csv(url){
let r=await fetch(url+"&_="+Date.now());
let t=await r.text();
return t.split("\n").map(x=>x.split(","));
}

// ===== CHARTS =====
let pie,waterChart;

// ===== SHEETS =====
const sheets={
near:"https://docs.google.com/spreadsheets/d/1NDBJNjEyQOr_Pc0cJaEE1jm8lGqLZWLgiH5uQ5fAr2w/export?format=csv&gid=645044779",
incident:"https://docs.google.com/spreadsheets/d/1O95sjMBE-vzSm-cdRlN98OjqPX_mubWSAL1nJuio6bA/export?format=csv&gid=1861922433",
comp:"https://docs.google.com/spreadsheets/d/1orsK8rpDVKNbQJa8aaCczKvoASL01KcV/export?format=csv&gid=623918223",
manhours:"https://docs.google.com/spreadsheets/d/1HMdv_W7UcDzQrNAjRrW9e-nZZhUUA3boYk9ZfAPAv2E/export?format=csv&gid=669455145",
water:"https://docs.google.com/spreadsheets/d/1b-8OGZK56Ejqm0SO44KzpCyo80awEODk/export?format=csv&gid=1876581317"
};

// ===== LOAD DATA =====
async function load(){

// ---- MANHOURS
let mh=await csv(sheets.manhours);
document.getElementById("mh").innerText = mh[1]?.[1]||0;

// ---- NEAR / INCIDENT
let near=await csv(sheets.near);
let inc=await csv(sheets.incident);

let n=near.length-1;
let ic=inc.length-1;

document.getElementById("near").innerText=n;
document.getElementById("incident").innerText=ic;

if(pie) pie.destroy();
pie=new Chart(document.getElementById("pie"),{
type:"pie",
data:{
labels:["Near","Incident"],
datasets:[{data:[n,ic],backgroundColor:["orange","red"]}]
}
});

// ---- COMPLIANCE
let comp=await csv(sheets.comp);
let html="";
let now=new Date();

for(let x of comp.slice(1)){
let d=new Date(x[8]);
if(!isNaN(d)){
let days=Math.ceil((d-now)/86400000);
if(days>0 && days<90){
html+=`<tr><td>${x[1]}</td><td>${days}</td></tr>`;
}
}
}
document.getElementById("compTbl").innerHTML=html;

// ---- WATER
let w=await csv(sheets.water);
let bw=0,stp=0,ro=0;

for(let r of w){
let name=(r[1]||"").toLowerCase();
let val=parseFloat(r.at(-1))||0;

if(name.includes("bwssb")) bw=val;
if(name.includes("stp")) stp=val;
if(name.includes("ro")) ro=val;
}

document.getElementById("bw").innerText=bw;
document.getElementById("stp").innerText=stp;
document.getElementById("ro").innerText=ro;

if(waterChart) waterChart.destroy();
waterChart=new Chart(document.getElementById("waterChart"),{
type:"bar",
data:{
labels:["BWSSB","STP","RO"],
datasets:[{
data:[bw,stp,ro],
backgroundColor:["blue","green","purple"]
}]
}
});

}

// ===== INIT =====
load();
setInterval(load,60000);

</script>
</body>
</html>
``
